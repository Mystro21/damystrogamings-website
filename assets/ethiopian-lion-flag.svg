<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Ethiopian tricolor flag with DM monogram</title>
  <desc id="desc">A green, yellow, and red Ethiopian tricolor with a centered black DM monogram.</desc>
  <defs>
    <linearGradient id="sun" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff4a8"/>
      <stop offset="0.48" stop-color="#f5c84f"/>
      <stop offset="1" stop-color="#b87416"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0" stop-color="#fff8d2" stop-opacity="0.85"/>
      <stop offset="0.55" stop-color="#f5c84f" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3d290a" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1c1508" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="960" height="180" fill="#078930"/>
  <rect y="180" width="960" height="180" fill="#fcd116"/>
  <rect y="360" width="960" height="180" fill="#da121a"/>
  <path d="M0 0h960v540H0z" fill="url(#glow)"/>
  <path d="M0 0h960v540H0z" fill="#0c0a05" opacity="0.1"/>

  <g filter="url(#softShadow)">
    <circle cx="480" cy="270" r="126" fill="#10251d" stroke="#f7d461" stroke-width="14"/>
    <circle cx="480" cy="270" r="105" fill="none" stroke="#fff0a8" stroke-width="3" opacity="0.8"/>
    <path d="M397 317H563" stroke="#f7d461" stroke-width="4" opacity="0.65"/>
    <text
      x="480"
      y="301"
      fill="#090a08"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="116"
      font-weight="700"
      letter-spacing="-8"
      text-anchor="middle"
    >DM</text>
    <text
      x="480"
      y="347"
      fill="#fff0a8"
      font-family="Arial, sans-serif"
      font-size="18"
      font-weight="700"
      letter-spacing="7"
      text-anchor="middle"
    >GAMINGS</text>
  </g>
</svg>
